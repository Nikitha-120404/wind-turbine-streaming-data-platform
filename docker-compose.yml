services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: wt_zookeeper
    restart: unless-stopped
    networks:
      - wt_net
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: wt_kafka
    restart: unless-stopped
    networks:
      - wt_net
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 20 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: wt_kafka_init
    networks:
      - wt_net
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic windturbine-raw --partitions 6 --replication-factor 1 \
        --config retention.ms=604800000 --config compression.type=lz4

      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic windturbine-alerts --partitions 3 --replication-factor 1 \
        --config retention.ms=2592000000 --config compression.type=lz4

      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic windturbine-dlq --partitions 2 --replication-factor 1 \
        --config retention.ms=1209600000 --config compression.type=lz4

      echo 'Kafka topics created.'
      kafka-topics --bootstrap-server kafka:29092 --list
      "
    restart: "no"

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: wt_timescaledb
    restart: unless-stopped
    networks:
      - wt_net
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-windturbine}
      POSTGRES_USER: ${DB_USER:-wt_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wt_password}
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-wt_user} -d ${DB_NAME:-windturbine}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  producer:
    build:
      context: .
      dockerfile: services/producer/Dockerfile
    container_name: wt_producer
    restart: unless-stopped
    networks:
      - wt_net
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/metrics | grep wt_service_up || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

  processor:
    build:
      context: .
      dockerfile: services/processor/Dockerfile
    container_name: wt_processor
    restart: unless-stopped
    networks:
      - wt_net
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8002/metrics | grep wt_service_up || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

  db_writer:
    build:
      context: .
      dockerfile: services/db_writer/Dockerfile
    container_name: wt_db_writer
    restart: unless-stopped
    networks:
      - wt_net
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      timescaledb:
        condition: service_healthy
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DB_HOST: timescaledb
    ports:
      - "8003:8003"

  ops_api:
    build:
      context: .
      dockerfile: services/ops_api/Dockerfile
    container_name: wt_ops_api
    restart: unless-stopped
    networks:
      - wt_net
    depends_on:
      timescaledb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DB_HOST: timescaledb
    ports:
      - "8000:8000"
      - "8004:8004"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: wt_prometheus
    restart: unless-stopped
    networks:
      - wt_net
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:10.4.0
    container_name: wt_grafana
    restart: unless-stopped
    networks:
      - wt_net
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-windturbine}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  timescale_data:
  prometheus_data:
  grafana_data:

networks:
  wt_net:
    driver: bridge